name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ShellCheck and Zsh
        run: sudo apt-get install -y shellcheck zsh

      - name: Verify bash syntax
        run: bash -n scripts/vol-analyze.sh

      - name: Run ShellCheck
        run: shellcheck scripts/vol-analyze.sh

      - name: Verify bash completions syntax
        run: bash -n completions/vol-analyze.bash

      - name: Verify zsh completions syntax
        run: zsh -n completions/vol-analyze.zsh

      - name: Check runtime dependency probes
        run: make check

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ShellCheck (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y shellcheck

      - name: Install ShellCheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install shellcheck

      - name: Run unit tests
        run: make test
