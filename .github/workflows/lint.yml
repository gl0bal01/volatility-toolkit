name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Verify bash syntax
        run: bash -n scripts/vol-analyze.sh

      - name: Run ShellCheck
        run: shellcheck scripts/vol-analyze.sh

      - name: Verify completions syntax
        run: bash -n completions/vol-analyze.bash
